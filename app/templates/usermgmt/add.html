{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<div class="page-header"><div><h2><i class="bi bi-person-plus me-2"></i>Add New User</h2></div></div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card-gold">
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6"><label>Username *</label><input type="text" name="username" class="form-control" required placeholder="Login username"></div>
            <div class="col-md-6"><label>Full Name</label><input type="text" name="full_name" class="form-control" placeholder="Display name"></div>
            <div class="col-md-6"><label>Role *</label><select name="role" class="form-select" required><option value="staff">Staff</option><option value="manager">Manager</option><option value="owner">Owner</option></select></div>
            <div class="col-md-6"><label>Password *</label><input type="password" name="password" class="form-control" required minlength="6" placeholder="Min. 6 characters"></div>
          </div>
          <hr class="gold-divider">
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold"><i class="bi bi-save"></i> Create User</button>
            <a href="{{ url_for('usermgmt.list_users') }}" class="btn-outline-gold"><i class="bi bi-x-circle"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
