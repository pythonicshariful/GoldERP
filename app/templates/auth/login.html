<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to GoldERP — Premium Gold Showroom Management System">
  <title>Login | GoldERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="login-bg">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">💰</div>
    <h1 class="login-title">GoldERP</h1>
    <p class="login-subtitle">Gold Showroom Management System</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show mb-3" role="alert" style="border-radius:10px;">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <!-- Login Form -->
    <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-right:none;color:rgba(255,255,255,0.6);">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Enter username" required autofocus
                 style="border-left:none;">
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-right:none;color:rgba(255,255,255,0.6);">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter password" required
                 style="border-left:none;border-right:none;">
          <span class="input-group-text toggle-pw" id="togglePw"
                style="background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-left:none;color:rgba(255,255,255,0.6);cursor:pointer;">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn-gold w-100 justify-content-center" style="font-size:1rem;padding:0.8rem;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <hr style="border-color:rgba(255,255,255,0.1);margin:1.5rem 0;">
    <p style="color:rgba(255,255,255,0.4);text-align:center;font-size:0.8rem;">
      Secure login powered by bcrypt encryption
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Toggle password visibility
  document.getElementById('togglePw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });
</script>
</body>
</html>
