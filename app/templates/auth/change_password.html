{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2><i class="bi bi-key me-2"></i>Change Password</h2>
    <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="{{ url_for('dashboard.index') }}">Dashboard</a></li>
      <li class="breadcrumb-item active">Change Password</li>
    </ol></nav>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card-gold">
      <div class="card-header"><h5><i class="bi bi-shield-lock me-2"></i>Update Your Password</h5></div>
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="mb-3">
            <label>Current Password</label>
            <input type="password" name="current_password" class="form-control" required placeholder="Enter current password">
          </div>
          <div class="mb-3">
            <label>New Password</label>
            <input type="password" name="new_password" class="form-control" required placeholder="Min. 6 characters" minlength="6">
          </div>
          <div class="mb-4">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required placeholder="Repeat new password">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold">
              <i class="bi bi-check-circle"></i> Update Password
            </button>
            <a href="{{ url_for('dashboard.index') }}" class="btn-outline-gold">
              <i class="bi bi-x-circle"></i> Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
