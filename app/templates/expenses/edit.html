{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}
{% block content %}
<div class="page-header">
  <div><h2><i class="bi bi-pencil me-2"></i>Edit Expense</h2></div>
</div>
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card-gold">
      <div class="card-header"><h5>Edit Expense #{{ expense.id }}</h5></div>
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label>Date *</label>
              <input type="date" name="expense_date" class="form-control" required value="{{ expense.expense_date.isoformat() }}">
            </div>
            <div class="col-md-6">
              <label>Expense Type *</label>
              <select name="expense_type" class="form-select" required>
                {% for val, label in expense_types %}
                <option value="{{ val }}" {% if expense.expense_type == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label>Description</label>
              <input type="text" name="description" class="form-control" value="{{ expense.description or '' }}">
            </div>
            <div class="col-md-6">
              <label>Amount (৳) *</label>
              <input type="number" step="0.01" name="amount" class="form-control" required value="{{ expense.amount }}">
            </div>
            <div class="col-md-6">
              <label>Payment Mode</label>
              <select name="paid_by" class="form-select">
                <option value="cash" {% if expense.paid_by == 'cash' %}selected{% endif %}>Cash</option>
                <option value="bank" {% if expense.paid_by == 'bank' %}selected{% endif %}>Bank</option>
              </select>
            </div>
          </div>
          <hr class="gold-divider">
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold"><i class="bi bi-save"></i> Update</button>
            <a href="{{ url_for('expenses.list_expenses') }}" class="btn-outline-gold"><i class="bi bi-x-circle"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
