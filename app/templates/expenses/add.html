{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h2><i class="bi bi-plus-circle me-2"></i>Add Expense</h2>
    <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="{{ url_for('expenses.list_expenses') }}">Expenses</a></li>
      <li class="breadcrumb-item active">Add New</li>
    </ol></nav>
  </div>
</div>
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card-gold">
      <div class="card-header"><h5><i class="bi bi-receipt me-2"></i>New Expense Entry</h5></div>
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label>Date *</label>
              <input type="date" name="expense_date" class="form-control" required value="{{ today.isoformat() }}">
            </div>
            <div class="col-md-6">
              <label>Expense Type *</label>
              <div class="input-group">
                <select name="expense_type" class="form-select" required>
                  <option value="">Select type...</option>
                  {% for val, label in expense_types %}
                  <option value="{{ val }}">{{ label }}</option>
                  {% endfor %}
                </select>
                <button type="button" class="btn btn-outline-gold" data-bs-toggle="modal" data-bs-target="#addTypeModal" title="Add new expense type">
                  <i class="bi bi-plus-lg"></i>
                </button>
              </div>
            </div>
            <div class="col-12">
              <label>Description</label>
              <input type="text" name="description" class="form-control" placeholder="e.g. Electricity bill for June">
            </div>
            <div class="col-md-6">
              <label>Amount (৳) *</label>
              <input type="number" step="0.01" name="amount" class="form-control" required
                     placeholder="0.00" min="0.01" id="amount">
            </div>
            <div class="col-md-6">
              <label>Payment Mode</label>
              <select name="paid_by" class="form-select">
                <option value="cash">Cash</option>
                <option value="bank">Bank Transfer</option>
              </select>
            </div>
          </div>
          <hr class="gold-divider">
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold"><i class="bi bi-save"></i> Save Expense</button>
            <a href="{{ url_for('expenses.list_expenses') }}" class="btn-outline-gold"><i class="bi bi-x-circle"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal for Add Expense Type -->
<div class="modal fade" id="addTypeModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form action="{{ url_for('expenses.add_expense_type') }}" method="POST">
        <div class="modal-header" style="background:var(--navy);color:white;">
          <h5 class="modal-title"><i class="bi bi-tags me-2 text-gold"></i>New Expense Type</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <label class="form-label">Type Name</label>
          <input type="text" name="new_type_name" class="form-control" required placeholder="e.g. Marketing, Snacks, etc.">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-gold">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
