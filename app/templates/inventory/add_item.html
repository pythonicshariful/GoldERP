{% extends "base.html" %}
{% block title %}Add Gold Item{% endblock %}
{% block content %}
<div class="page-header">
  <div><h2><i class="bi bi-plus-circle me-2"></i>Add Gold Item</h2></div>
</div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card-gold">
      <div class="card-header"><h5>New Item</h5></div>
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label>Item Code *</label>
              <input type="text" name="item_code" class="form-control" required placeholder="e.g. RNG-001">
            </div>
            <div class="col-md-6">
              <label>Item Name *</label>
              <input type="text" name="item_name" class="form-control" required placeholder="e.g. Ring 21K">
            </div>
            <div class="col-md-6">
              <label>Category</label>
              <select name="category" class="form-select">
                <option value="finished">Finished</option>
                <option value="raw">Raw Gold</option>
              </select>
            </div>
            <div class="col-md-6">
              <label>Unit</label>
              <select name="unit" class="form-select">
                <option value="gram">Gram</option>
                <option value="tola">Tola</option>
                <option value="piece">Piece</option>
              </select>
            </div>
          </div>
          <hr class="gold-divider">
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold"><i class="bi bi-save"></i> Save Item</button>
            <a href="{{ url_for('inventory.list_items') }}" class="btn-outline-gold"><i class="bi bi-x-circle"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
