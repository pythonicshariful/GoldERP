{% extends "base.html" %}
{% block title %}Edit Item{% endblock %}
{% block content %}
<div class="page-header"><div><h2><i class="bi bi-pencil me-2"></i>Edit Item: {{ item.item_name }}</h2></div></div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card-gold">
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6"><label>Item Code</label><input type="text" name="item_code" class="form-control" required value="{{ item.item_code }}"></div>
            <div class="col-md-6"><label>Item Name</label><input type="text" name="item_name" class="form-control" required value="{{ item.item_name }}"></div>
            <div class="col-md-6"><label>Category</label><select name="category" class="form-select"><option value="finished" {% if item.category=='finished' %}selected{% endif %}>Finished</option><option value="raw" {% if item.category=='raw' %}selected{% endif %}>Raw Gold</option></select></div>
            <div class="col-md-6"><label>Unit</label><select name="unit" class="form-select"><option value="gram" {% if item.unit=='gram' %}selected{% endif %}>Gram</option><option value="tola" {% if item.unit=='tola' %}selected{% endif %}>Tola</option><option value="piece" {% if item.unit=='piece' %}selected{% endif %}>Piece</option></select></div>
          </div>
          <hr class="gold-divider">
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold"><i class="bi bi-save"></i> Update</button>
            <a href="{{ url_for('inventory.list_items') }}" class="btn-outline-gold"><i class="bi bi-x-circle"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
