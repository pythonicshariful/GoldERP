{% extends "base.html" %}
{% block title %}Manual Cashbook Entry{% endblock %}
{% block content %}
<div class="page-header"><div><h2><i class="bi bi-pencil-square me-2"></i>Manual Cashbook Entry</h2></div></div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card-gold">
      <div class="card-header"><h5>New Manual Entry</h5><span class="badge badge-navy">Manager / Owner</span></div>
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6"><label>Date *</label><input type="date" name="txn_date" class="form-control" required value="{{ today.isoformat() }}"></div>
            <div class="col-md-6"><label>Transaction Type *</label><select name="txn_type" class="form-select" required><option value="receipt">Cash In (Receipt)</option><option value="payment">Cash Out (Payment)</option></select></div>
            <div class="col-12"><label>Particulars *</label><input type="text" name="particulars" class="form-control" required placeholder="Description of this entry"></div>
            <div class="col-md-6"><label>Amount (৳) *</label><input type="number" step="0.01" name="amount" class="form-control" required placeholder="0.00" min="0.01"></div>
          </div>
          <hr class="gold-divider">
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold"><i class="bi bi-save"></i> Post Entry</button>
            <a href="{{ url_for('cashbook.daily') }}" class="btn-outline-gold"><i class="bi bi-x-circle"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
