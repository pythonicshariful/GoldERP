{% extends "base.html" %}
{% block title %}Edit Staff{% endblock %}
{% block content %}
<div class="page-header"><div><h2><i class="bi bi-pencil me-2"></i>Edit Staff: {{ member.staff_name }}</h2></div></div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card-gold">
      <div class="card-body">
        <form method="POST" class="form-gold needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-12"><label>Full Name *</label><input type="text" name="staff_name" class="form-control" required value="{{ member.staff_name }}"></div>
            <div class="col-md-6"><label>Designation</label><input type="text" name="designation" class="form-control" value="{{ member.designation or '' }}"></div>
            <div class="col-md-6"><label>Basic Salary (৳)</label><input type="number" step="0.01" name="basic_salary" class="form-control" required value="{{ member.basic_salary }}"></div>
            <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if member.is_active %}checked{% endif %}><label class="form-check-label" for="is_active">Active</label></div></div>
          </div>
          <hr class="gold-divider">
          <div class="d-flex gap-2">
            <button type="submit" class="btn-gold"><i class="bi bi-save"></i> Update</button>
            <a href="{{ url_for('staff.list_staff') }}" class="btn-outline-gold"><i class="bi bi-x-circle"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
